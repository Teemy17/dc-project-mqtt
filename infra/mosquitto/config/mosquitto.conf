# Mosquitto MQTT Broker Configuration

# Default listener
listener 1883
protocol mqtt

# WebSockets listener (optional, for web clients)
listener 9001
protocol websockets

# Allow anonymous connections (set to false for production)
allow_anonymous false

# Password file
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Connection messages
connection_messages true

# Maximum QoS (0, 1, or 2)
max_qos 2

# Maximum number of client connections (-1 for unlimited)
max_connections -1
